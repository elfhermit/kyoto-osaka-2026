<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正能量企鵝的京阪夏日大冒險 🐧✨</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['"Nunito"', '"M PLUS Rounded 1c"', 'sans-serif'],
                    },
                    colors: {
                        penguin: {
                            light: '#e2e8f0',
                            dark: '#334155',
                            blue: '#bae6fd',
                            pink: '#fbcfe8',
                            yellow: '#fef08a'

                        sakura: '#ffb7c5',
                        matcha: '#a8e6cf',
                        coffee: '#8b5a2b'

                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'float': 'float 4s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }

    <style>
        body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(#fbcfe8 2px, transparent 2px),
                radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }
        .kawaii-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            border: 3px solid #334155;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        /* 隱藏橫向滾動條 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Desktop Scrollbar */
        @media (min-width: 1024px) {
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
            ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 導航按鈕樣式 */
        .map-link {
            color: #0284c7;
            font-weight: 800;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.15rem 0.5rem;
            background: #e0f2fe;
            border: 2px solid #bae6fd;
            border-radius: 999px;
            font-size: 0.85rem;
            transition: all 0.2s;
            margin: 0.1rem 0.2rem;
        }
        .map-link:hover {
            background: #bae6fd;
            border-color: #38bdf8;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);

</head>
<body class="text-penguin-dark antialiased">

    <!-- Header Section -->
    <header class="w-full max-w-6xl mx-auto pt-6 px-4 mb-6">

            <div class="absolute top-2 right-4 lg:top-4 lg:right-6 text-4xl lg:text-5xl animate-float z-10">🐧</div>
            <div class="absolute top-10 right-16 lg:top-12 lg:right-20 text-2xl lg:text-3xl animate-bounce-slow z-10">✨</div>
            
            <div class="p-6 md:p-10 text-center relative z-20">
                <span class="inline-block bg-penguin-yellow text-penguin-dark font-bold px-3 py-1 lg:px-4 rounded-full border-2 border-penguin-dark mb-3 text-xs lg:text-sm transform -rotate-2">
                    2026 夏日限定！
                </span>
                <h1 class="text-2xl md:text-5xl font-extrabold mb-3 tracking-tight leading-snug">
                    京阪夏日夢幻大冒險 🌸
                </h1>
                <p class="text-sm md:text-lg font-bold text-gray-600 mb-2">
                    「療癒收集御朱印，今天也要開心喔！」
                </p>
            </div>
            <!-- Main Hero Banner -->
            <div class="w-full bg-penguin-blue border-t-3 border-penguin-dark overflow-hidden flex justify-center">

            </div>
        </div>
    </header>

    <!-- Global Travel Tips Section -->
    <section class="w-full max-w-6xl mx-auto px-4 mb-6">
        <div class="bg-white rounded-3xl p-5 md:p-6 kawaii-shadow border-l-8 border-sakura flex flex-col md:flex-row gap-4 items-start md:items-center">
            <div class="bg-sakura text-white w-16 h-16 rounded-full flex shrink-0 items-center justify-center text-3xl font-bold kawaii-shadow transform -rotate-6">
                <i class="fa-solid fa-bullhorn"></i>
            </div>
            <div class="flex-1">
                <h2 class="text-lg md:text-xl font-extrabold mb-2 text-penguin-dark">行前小叮嚀＆注意事項 🎒</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2 text-sm font-medium text-gray-600">
                    <p><i class="fa-solid fa-sun text-yellow-500 w-5"></i> <b>夏日酷暑：</b> 京阪盆地夏天非常悶熱，務必攜帶晴雨兩用傘、隨身小電風扇並隨時補充水分。</p>
                    <p><i class="fa-solid fa-mobile-screen-button text-blue-500 w-5"></i> <b>交通支付：</b> 建議出發前將 Suica 或 ICOCA 綁定 Apple Pay，進出車站直接逼手機超方便。</p>
                    <p><i class="fa-solid fa-book-open text-red-400 w-5"></i> <b>御朱印禮儀：</b> 請先「參拜」再「求取御朱印」，並準備好剛好的零錢（通常為 300 或 500 日圓）。</p>
                    <p><i class="fa-solid fa-bag-shopping text-pink-500 w-5"></i> <b>免稅注意：</b> 購物滿 5,000 日圓（未稅）即可退稅，結帳前記得出示護照，免稅品不可在日本境內拆封使用。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content Area -->
    <main class="w-full max-w-6xl mx-auto px-4 pb-20 flex flex-col lg:flex-row gap-6 relative">
        
        <!-- Sidebar / Day Navigation (Sticky for Mobile & Desktop) -->
        <aside class="w-full lg:w-1/4 sticky top-2 z-40">
            <div class="glass-panel kawaii-shadow rounded-3xl lg:rounded-[2rem] p-3 lg:p-6">
                <h2 class="hidden lg:flex text-xl font-bold mb-4 items-center gap-2">
                    <i class="fa-solid fa-map-location-dot text-sakura"></i> 每日行程表
                </h2>
                <!-- 導覽列：手機版橫向滑動，電腦版垂直排列 -->
                <nav id="day-nav" class="flex flex-row lg:flex-col gap-2 overflow-x-auto hide-scrollbar snap-x snap-mandatory pb-1 lg:pb-0 scroll-smooth">
                    <!-- Nav buttons will be generated by JS -->
                </nav>
            </div>
        </aside>

        <!-- Itinerary Content -->

            <!-- Content will be injected by JS -->
        </section>
    </main>

                },
                rainPlan: `神戶的 ${gm('神戶動物王國')} 是全室內的超讚動物園，或整天泡在 umie 購物中心也很棒。`,
                cafeStop: `北野異人館逛累了，務必去百年洋房改建的 ${gm('星巴克 神戶北野異人館店')} 拍美照休息。`,
                notes: ["⚠️ <b>生田神社：</b> 御朱印授予至 17:00。", "💡 <b>交通：</b> 從大阪難波搭乘阪神電車前往神戶三宮，車程僅約 45 分鐘。"]
            },
            {
                day: 9, title: "巨大獅子殿祈福、滿載而歸", area: "大阪", icon: "fa-bag-shopping",
                quote: "「平安回家，就是最完美的旅行結尾喔！」",
                summary: "旅程最後一天，用最具震撼力的獅子神像為整趟旅行畫下正能量句點。",
                schedule: {
                    morning: { time: "上午 (10:00)", desc: `⛩️ 飯店退房後前往 ${gm('難波八阪神社')}。在巨大「獅子殿」前祈福吸走厄運，收集最後一枚御朱印。` },
                    afternoon: { time: "下午 (13:00)", desc: `🚆 搭乘南海電鐵特急 Rapi:t 前往 ${gm('關西國際機場')}。在免稅店做最後巡禮。` },
                    evening: { time: "晚上", desc: `✈️ 搭乘晚班機，帶著滿滿的回憶與御朱印平安返台。` }
                },
                rainPlan: `前往 ${gm('難波 Parks')} 或 ${gm('難波 CITY')} 進行搭車前最後的室內逛街。`,
                cafeStop: `若想找地方整理行李戰利品，${gm('星巴克 難波SkyO店')} 空間寬敞舒適。`,
                notes: ["⚠️ <b>難波八阪神社：</b> 授予所 09:00-17:00。早上去剛好順路且人潮較少。", "💡 <b>機場報到：</b> 暑假人潮多，強烈建議起飛前 2.5 至 3 小時抵達機場排隊！"]
            }
        ];

        const navContainer = document.getElementById('day-nav');
        const contentContainer = document.getElementById('itinerary-content');

        function renderApp() {
            // Generate Nav Buttons
            itineraryData.forEach((data, index) => {
                const btn = document.createElement('button');
                btn.className = `shrink-0 snap-center w-auto lg:w-full text-left px-4 lg:px-5 py-3 rounded-2xl border-2 font-bold transition-all duration-200 flex items-center justify-between whitespace-nowrap lg:whitespace-normal ${index === 0 ? 'bg-penguin-pink border-penguin-dark shadow-md' : 'bg-white border-transparent hover:border-penguin-light hover:bg-slate-50'}`;
                btn.onclick = () => selectDay(index);
                btn.id = `nav-btn-${index}`;
                btn.innerHTML = `
                    <span class="flex items-center"><span class="text-[10px] lg:text-xs bg-penguin-dark text-white px-2 py-0.5 lg:py-1 rounded-md mr-2">Day ${data.day}</span> <span class="text-sm lg:text-base">${data.area}</span></span>
                    <i class="hidden lg:block fa-solid fa-chevron-right text-sm opacity-50 ml-2"></i>
                `;
                navContainer.appendChild(btn);

                // Generate Content Cards
                const card = document.createElement('div');
                card.id = `content-day-${index}`;
                card.className = `tab-content ${index === 0 ? 'active' : ''} glass-panel rounded-3xl lg:rounded-[2rem] kawaii-shadow overflow-hidden mb-8`;
                
                let notesHtml = data.notes.map(note => `<li class="mb-2 last:mb-0">${note}</li>`).join('');

                card.innerHTML = `
                    <!-- Card Header -->
                    <div class="bg-penguin-blue p-5 md:p-8 border-b-3 border-penguin-dark relative">
                        <div class="absolute right-4 top-4 lg:right-6 lg:top-6 w-12 h-12 lg:w-16 lg:h-16 bg-white rounded-full flex items-center justify-center text-2xl lg:text-3xl kawaii-shadow transform rotate-12 border-2 border-penguin-dark">
                            <i class="fa-solid ${data.icon} text-penguin-dark"></i>
                        </div>
                        <h3 class="text-xl md:text-3xl font-extrabold mb-3 pr-14 lg:pr-20 leading-tight">Day ${data.day}: ${data.title}</h3>
                        <p class="text-sm font-bold text-slate-600 mb-4 bg-white/50 inline-block px-3 py-1 rounded-lg">${data.summary}</p>
                        <br>
                        <div class="inline-block bg-white px-3 py-1 lg:px-4 lg:py-1.5 rounded-full font-bold text-xs lg:text-sm kawaii-shadow text-sakura border border-pink-100">
                            🐧 ${data.quote}
                        </div>
                    </div>

                    <!-- Card Body: Schedule -->
                    <div class="p-5 md:p-8">
                        <div class="space-y-4 lg:space-y-6 mb-8">
                            <!-- Morning -->
                            <div class="flex gap-3 lg:gap-4 group">
                                <div class="w-14 h-14 lg:w-16 lg:h-16 shrink-0 bg-yellow-100 rounded-2xl flex flex-col items-center justify-center border-2 border-yellow-300 group-hover:bg-yellow-200 transition-colors">
                                    <i class="fa-solid fa-sun text-yellow-500 mb-0.5 lg:mb-1 text-sm lg:text-base"></i>
                                    <span class="text-[9px] lg:text-[10px] font-bold text-yellow-700">${data.schedule.morning.time}</span>
                                </div>
                                <div class="bg-white p-3 lg:p-4 rounded-2xl border-2 border-slate-100 flex-1 shadow-sm hover:shadow-md transition-shadow text-sm lg:text-base font-medium text-gray-700 leading-relaxed">
                                    ${data.schedule.morning.desc}
                                </div>
                            </div>

                            <!-- Afternoon -->
                            <div class="flex gap-3 lg:gap-4 group">
                                <div class="w-14 h-14 lg:w-16 lg:h-16 shrink-0 bg-orange-100 rounded-2xl flex flex-col items-center justify-center border-2 border-orange-300 group-hover:bg-orange-200 transition-colors">
                                    <i class="fa-solid fa-cloud-sun text-orange-500 mb-0.5 lg:mb-1 text-sm lg:text-base"></i>
                                    <span class="text-[9px] lg:text-[10px] font-bold text-orange-700">${data.schedule.afternoon.time}</span>
                                </div>
                                <div class="bg-white p-3 lg:p-4 rounded-2xl border-2 border-slate-100 flex-1 shadow-sm hover:shadow-md transition-shadow text-sm lg:text-base font-medium text-gray-700 leading-relaxed">
                                    ${data.schedule.afternoon.desc}
                                </div>
                            </div>

                            <!-- Evening -->
                            <div class="flex gap-3 lg:gap-4 group">
                                <div class="w-14 h-14 lg:w-16 lg:h-16 shrink-0 bg-indigo-100 rounded-2xl flex flex-col items-center justify-center border-2 border-indigo-300 group-hover:bg-indigo-200 transition-colors">
                                    <i class="fa-solid fa-moon text-indigo-500 mb-0.5 lg:mb-1 text-sm lg:text-base"></i>
                                    <span class="text-[9px] lg:text-[10px] font-bold text-indigo-700">${data.schedule.evening.time}</span>
                                </div>
                                <div class="bg-white p-3 lg:p-4 rounded-2xl border-2 border-slate-100 flex-1 shadow-sm hover:shadow-md transition-shadow text-sm lg:text-base font-medium text-gray-700 leading-relaxed">
                                    ${data.schedule.evening.desc}
                                </div>
                            </div>
                        </div>
                        
                        <!-- Alternative Plans (Rain / Cafe) -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                            <div class="bg-blue-50 p-4 rounded-2xl border-2 border-blue-200">
                                <h4 class="font-bold text-blue-800 mb-2 flex items-center gap-2"><i class="fa-solid fa-cloud-rain text-blue-500"></i> ☔ 雨備方案</h4>
                                <p class="text-sm font-medium text-gray-700">${data.rainPlan}</p>
                            </div>
                            <div class="bg-amber-50 p-4 rounded-2xl border-2 border-amber-200">
                                <h4 class="font-bold text-coffee mb-2 flex items-center gap-2"><i class="fa-solid fa-mug-hot text-amber-600"></i> ☕ 腿痠休息站</h4>
                                <p class="text-sm font-medium text-gray-700">${data.cafeStop}</p>
                            </div>
                        </div>

                        <!-- Notes Section -->
                        <div class="bg-penguin-pink/30 p-4 lg:p-5 rounded-2xl border-2 border-sakura">
                            <h4 class="font-bold text-base lg:text-lg mb-2 lg:mb-3 flex items-center gap-2 text-penguin-dark">
                                <i class="fa-solid fa-circle-exclamation text-sakura"></i> 企鵝的貼心小筆記
                            </h4>
                            <ul class="text-xs lg:text-sm font-medium text-gray-700 space-y-1.5 lg:space-y-2">
                                ${notesHtml}
                            </ul>
                        </div>
                    </div>
                `;
                contentContainer.appendChild(card);
            });
        }

        function selectDay(index) {
            // Update buttons styling
            document.querySelectorAll('#day-nav button').forEach((btn, i) => {
                if (i === index) {
                    btn.classList.add('bg-penguin-pink', 'border-penguin-dark', 'shadow-md');
                    btn.classList.remove('bg-white', 'border-transparent', 'hover:bg-slate-50');
                } else {
                    btn.classList.remove('bg-penguin-pink', 'border-penguin-dark', 'shadow-md');
                    btn.classList.add('bg-white', 'border-transparent', 'hover:bg-slate-50');
                }
            });

            // 手機版：讓被點擊的按鈕在橫向卷軸中自動置中
            const activeBtn = document.getElementById(`nav-btn-${index}`);
            if (window.innerWidth < 1024) {
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            // Update content with animation reset
            document.querySelectorAll('.tab-content').forEach((content, i) => {
                if (i === index) {
                    content.classList.remove('active');
                    void content.offsetWidth; // Trigger reflow to restart animation
                    content.classList.add('active');
                } else {
                    content.classList.remove('active');
                }
            });

            // 平滑滾動至行程內容開頭 (考量到上方有 Sticky 導覽列的偏移)
            if (window.innerWidth < 1024) {
                const contentEl = document.getElementById('itinerary-content');
                const offset = 80; 
                const bodyRect = document.body.getBoundingClientRect().top;
                const elementRect = contentEl.getBoundingClientRect().top;
                const elementPosition = elementRect - bodyRect;
                const offsetPosition = elementPosition - offset;

                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
            } else {
                window.scrollTo({ top: 300, behavior: 'smooth' });
            }
        }

        // Initialize App
        renderApp();
    </script>
</body>
</html>
