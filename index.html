<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🌸 名古屋・京都・大阪 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f0f2f5;color:#1e293b;min-height:100vh}
::-webkit-scrollbar{display:none}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeSlide .3s ease}
/* Header */
.header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:20px 16px 16px;position:relative}
.header-title{font-size:20px;font-weight:700;margin-bottom:4px}
.header-sub{font-size:12px;color:#94a3b8;margin-bottom:10px}
.header-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;font-size:11px;color:#e2e8f0}
.lang-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit}
.lang-btn:hover{background:rgba(255,255,255,.3)}
/* Tabs */
.tab-bar{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100;overflow-x:auto;white-space:nowrap;display:flex}
.tab{display:inline-flex;align-items:center;gap:4px;padding:12px 14px;font-size:12px;cursor:pointer;border-bottom:3px solid transparent;color:#64748b;flex-shrink:0;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#1e293b;font-weight:700;border-bottom-color:var(--day-color,#6366f1)}
/* Cards */
.panel{padding:12px;max-width:600px;margin:0 auto}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:12px;overflow:hidden}
.card-header{padding:12px 14px;font-weight:700;font-size:13px;border-bottom:1px solid #f1f5f9}
.card-body{padding:12px 14px}
/* Day header */
.day-header{padding:16px;color:#fff;display:flex;align-items:center;gap:10px}
.day-num{font-size:28px;font-weight:700;line-height:1}
.day-info{flex:1}
.day-title{font-size:16px;font-weight:700}
.day-date{font-size:11px;opacity:.85;margin-top:2px}
.day-city{font-size:11px;opacity:.75}
/* Timeline */
.timeline{list-style:none;padding:0}
.tl-item{display:flex;gap:10px;padding:8px 0;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:16px;top:32px;bottom:-8px;width:2px;background:#e2e8f0}
.tl-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:#f1f5f9;border:2px solid #e2e8f0}
.tl-content{flex:1;padding-top:4px}
.tl-time{font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:2px}
.tl-main{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.tl-desc{font-size:12px;color:#64748b;line-height:1.5}
/* Route card */
.route-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.route-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.route-label{font-size:12px;font-weight:700;color:#374151}
.route-badges{display:flex;gap:4px}
.r-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.r-badge.time{background:#dbeafe;color:#1d4ed8}
.r-badge.cost{background:#d1fae5;color:#065f46}
.route-step{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px}
.step-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.step-line{flex:1;height:2px;background:currentColor;opacity:.3}
.step-text{color:#374151}
.step-from,.step-to{font-weight:600;color:#1e293b}
.step-via{font-size:11px;color:#64748b;background:#f1f5f9;padding:1px 6px;border-radius:6px}
/* Maps button */
.map-btn{display:inline-flex;align-items:center;gap:4px;background:#1a73e8;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;text-decoration:none;margin-top:4px}
.map-btn:hover{background:#1558b0}
/* Tips */
.tip-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:12px;color:#475569;line-height:1.5}
.tip-item:last-child{border-bottom:none}
.tip-icon{flex-shrink:0;font-size:14px}
/* Rain backup */
.rain-card{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1.5px solid #bfdbfe;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.rain-title{font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:6px}
.rain-item{font-size:12px;color:#1e40af;padding:3px 0;line-height:1.5}
/* Climate card */
.climate-card{background:linear-gradient(135deg,#fef9c3,#fef08a);border:1.5px solid #fde047;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.climate-title{font-size:12px;font-weight:700;color:#854d0e;margin-bottom:6px}
.climate-row{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#713f12;margin-bottom:4px}
.climate-note{font-size:11px;color:#a16207;margin-top:4px}
/* Transport panel */
.transport-summary{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:1.5px solid #c4b5fd;border-radius:10px;padding:12px;margin-bottom:12px}
.transport-verdict{font-size:14px;font-weight:700;color:#5b21b6;margin-bottom:4px}
.transport-saving{font-size:12px;color:#7c3aed}
.compare-table{width:100%;border-collapse:collapse;font-size:12px}
.compare-table th{background:#f8fafc;padding:8px 6px;text-align:left;font-size:11px;color:#64748b;border-bottom:1px solid #e2e8f0}
.compare-table td{padding:8px 6px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.compare-table tr:last-child td{border-bottom:none}
.rec-tag{background:#d1fae5;color:#065f46;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700;margin-left:4px}
.warn-tag{background:#fef3c7;color:#92400e;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700;margin-left:4px}
/* Spot list */
.spot-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9}
.spot-item:last-child{border-bottom:none}
.spot-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.spot-info{flex:1}
.spot-name{font-size:13px;font-weight:700;color:#1e293b}
.spot-loc{font-size:11px;color:#64748b;margin:2px 0}
.spot-desc{font-size:11px;color:#94a3b8;line-height:1.4}
.veg-tag{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.veg-full{background:#d1fae5;color:#065f46}
.veg-part{background:#fef3c7;color:#92400e}
.veg-no{background:#fee2e2;color:#991b1b}
/* Checklist */
.check-section{margin-bottom:16px}
.check-section-title{font-size:13px;font-weight:700;color:#1e293b;padding:8px 0;border-bottom:2px solid #e2e8f0;margin-bottom:8px}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #f8fafc;cursor:pointer}
.check-item:last-child{border-bottom:none}
.check-box{width:18px;height:18px;border:2px solid #94a3b8;border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check-box.done{background:#10b981;border-color:#10b981}
.check-text{font-size:12px;color:#374151;line-height:1.5;flex:1}
.check-text.done{text-decoration:line-through;color:#94a3b8}
.check-urgent{font-size:10px;background:#fee2e2;color:#dc2626;padding:1px 6px;border-radius:8px;font-weight:700;margin-left:4px}
/* Section heading */
.section-title{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;padding:8px 0 4px;border-bottom:1px solid #e2e8f0;margin-bottom:8px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ── Translation strings ── */
const T = {
  zh: {
    title: "名古屋・京都・大阪 9天8夜",
    subtitle: "2026/07/20 – 07/28 ✈ 台灣虎航 WD9K9X",
    lang: "EN",
    transport: "🚇 交通攻略",
    penguin: "🐧 掃貨地圖",
    food: "🍜 美食清單",
    checklist: "✅ 待辦清單",
    mapBtn: "地圖",
    timeline: "時間軸",
    route: "交通路線",
    tips: "小提示",
    rain: "☔ 雨備方案",
    climate: "☀️ 7月下旬氣候均值",
    climateNote: "⚠️ 超出預報範圍，出發前 10–14 天請查 tenki.jp",
    vegFull: "全素",
    vegPart: "部分素",
    vegNo: "含葷",
    storeList: "企鵝周邊店家",
    cafeList: "網美咖啡",
    suvList: "伴手禮",
    restaurantList: "素食餐廳",
    transportAdvice: "交通建議",
    passEval: "Pass 評估",
    routeComp: "路段比價",
    buyWhere: "購票方式",
    notes: "注意事項",
  },
  en: {
    title: "Nagoya · Kyoto · Osaka 9D8N",
    subtitle: "2026/07/20 – 07/28 ✈ Tigerair TW WD9K9X",
    lang: "中文",
    transport: "🚇 Transport",
    penguin: "🐧 Merch Map",
    food: "🍜 Food List",
    checklist: "✅ Checklist",
    mapBtn: "Map",
    timeline: "Schedule",
    route: "Transit",
    tips: "Tips",
    rain: "☔ Rain Plan",
    climate: "☀️ July Climate Average",
    climateNote: "⚠️ Beyond forecast range — check tenki.jp 10–14 days before departure",
    vegFull: "Vegan",
    vegPart: "Partial",
    vegNo: "Non-veg",
    storeList: "Penguin Merch Stores",
    cafeList: "Cafes",
    suvList: "Souvenirs",
    restaurantList: "Veg Restaurants",
    transportAdvice: "Transport Verdict",
    passEval: "Pass Evaluation",
    routeComp: "Route Comparison",
    buyWhere: "Where to Buy",
    notes: "Notes",
  }
};

/* ── Climate card (all days — beyond 16-day forecast) ── */
function ClimateCard({ lang }) {
  const t = T[lang];
  return (
    <div className="climate-card">
      <div className="climate-title">{t.climate}</div>
      <div className="climate-row">
        <span>🌡️ <b>32–35°C</b> / 24–27°C</span>
        <span>💧 {lang==="zh"?"濕度 70–85%":"Humidity 70–85%"}</span>
        <span>⛈️ {lang==="zh"?"午後雷陣雨":"Afternoon Thundershowers"}</span>
      </div>
      <div style={{fontSize:12,color:"#713f12",marginBottom:3}}>
        👕 {lang==="zh"?"穿搭：輕薄短袖 + 折傘必備 + SPF50+ 防曬":"Outfit: Light tee + folding umbrella + SPF50+ sunscreen"}
      </div>
      <div className="climate-note">{t.climateNote}</div>
    </div>
  );
}

/* ── Map button ── */
function MapBtn({ url, lang }) {
  return (
    <a href={url} target="_blank" rel="noreferrer" className="map-btn">
      📍 {T[lang].mapBtn}
    </a>
  );
}

/* ── Route card ── */
function RouteCard({ route, lang }) {
  return (
    <div className="route-card">
      <div className="route-header">
        <span className="route-label">{route.label}</span>
        <div className="route-badges">
          {route.time && <span className="r-badge time">⏱ {route.time}</span>}
          {route.cost && <span className="r-badge cost">¥{route.cost}</span>}
        </div>
      </div>
      {route.steps && route.steps.map((s, i) => (
        <div key={i} className="route-step">
          <div className="step-dot" style={{background: s.color||"#94a3b8"}}/>
          <span className="step-from">{s.from}</span>
          <div style={{flex:1,height:2,background:s.color||"#94a3b8",opacity:.4,margin:"0 4px",alignSelf:"center"}}/>
          <span className="step-to">{s.to}</span>
          {s.via && <span className="step-via">{s.via}</span>}
        </div>
      ))}
      {route.note && <div style={{fontSize:11,color:"#64748b",marginTop:6}}>{route.note}</div>}
      {route.mapUrl && <MapBtn url={route.mapUrl} lang={lang}/>}
    </div>
  );
}

/* ── Day Panel ── */
function DayPanel({ data, lang }) {
  const t = T[lang];
  return (
    <div className="fade">
      {/* Day header */}
      <div className="day-header" style={{background: data.color}}>
        <div>
          <div style={{fontSize:11,opacity:.8}}>{lang==="zh"?"第":"Day "}{data.day}{lang==="zh"?"天":""}</div>
          <div className="day-num">{data.icon}</div>
        </div>
        <div className="day-info">
          <div className="day-title">{lang==="zh"?data.titleZh:data.titleEn}</div>
          <div className="day-date">{data.date}</div>
          <div className="day-city">{data.city}</div>
        </div>
      </div>
      <div className="panel">
        <ClimateCard lang={lang}/>
        {/* Timeline */}
        <div className="card">
          <div className="card-header">⏰ {t.timeline}</div>
          <div className="card-body">
            <ul className="timeline">
              {data.timeline.map((item, i) => (
                <li key={i} className="tl-item">
                  <div className="tl-dot">{item.icon}</div>
                  <div className="tl-content">
                    <div className="tl-time">{item.time}</div>
                    <div className="tl-main">{lang==="zh"?item.mainZh:item.mainEn}</div>
                    {item.desc && <div className="tl-desc">{lang==="zh"?item.descZh:item.descEn}</div>}
                    {item.mapUrl && <MapBtn url={item.mapUrl} lang={lang}/>}
                  </div>
                </li>
              ))}
            </ul>
          </div>
        </div>
        {/* Routes */}
        {data.routes && data.routes.length > 0 && (
          <div className="card">
            <div className="card-header">🚆 {t.route}</div>
            <div className="card-body">
              {data.routes.map((r, i) => <RouteCard key={i} route={r} lang={lang}/>)}
            </div>
          </div>
        )}
        {/* Tips */}
        {data.tips && (
          <div className="card">
            <div className="card-header">💡 {t.tips}</div>
            <div className="card-body">
              {data.tips.map((tip, i) => (
                <div key={i} className="tip-item">
                  <span className="tip-icon">{tip.icon}</span>
                  <span>{lang==="zh"?tip.zh:tip.en}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {/* Rain */}
        {data.rain && (
          <div className="rain-card">
            <div className="rain-title">{t.rain}</div>
            {data.rain.map((r, i) => (
              <div key={i} className="rain-item">• {lang==="zh"?r.zh:r.en}</div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Transport Panel ── */
function TransportPanel({ lang }) {
  const t = T[lang];
  const routes = [
    { seg: lang==="zh"?"中部機場 → 名古屋":"Centrair → Nagoya", rec: lang==="zh"?"Klook 名鐵 μ-SKY 券":"Meitetsu μ-SKY (Klook)", price: "1,430", alt: lang==="zh"?"一般特急 ¥980":"Regular Ltd. Exp. ¥980", note: lang==="zh"?"全車指定席+行李架":"Reserved all seats + luggage rack", best: true },
    { seg: lang==="zh"?"名古屋 → 京都":"Nagoya → Kyoto", rec: lang==="zh"?"SmartEX App Hikari":"SmartEX App Hikari", price: "5,920", alt: "Nozomi ¥6,440", note: lang==="zh"?"App 綁 IC 卡直接進站":"IC card boarding via app", best: true },
    { seg: lang==="zh"?"京都 → 大阪難波":"Kyoto → Osaka Namba", rec: lang==="zh"?"近鐵 あをによし 特急":"Kintetsu Aoniyoshi Ltd. Exp.", price: "2,240", alt: lang==="zh"?"普通 ¥570":"Regular ¥570", note: lang==="zh"?"出發1個月前10:30搶票！":"Book 1 month before, 10:30 AM!", best: true },
    { seg: lang==="zh"?"難波 → 關西機場":"Namba → KIX", rec: lang==="zh"?"南海 Rapi:t (Klook)":"Nankai Rapi:t (Klook)", price: "1,290", alt: lang==="zh"?"普通特急 ¥930":"Airport Express ¥930", note: lang==="zh"?"外國人優惠，省¥200":"Tourist discount saves ¥200", best: true },
    { seg: lang==="zh"?"市內地鐵/公車":"City Transit", rec: lang==="zh"?"ICOCA Apple Pay":"ICOCA Apple Pay", price: lang==="zh"?"按距離":"by distance", alt: "—", note: lang==="zh"?"便利商店/自販機也能用":"Works at konbini & vending machines", best: true },
  ];
  const passes = [
    { name: lang==="zh"?"JR 7日全國 Pass":"JR 7-day Pass", price: "50,000/人", verdict: lang==="zh"?"❌ 本行程省不回來，少用 JR":"❌ Not worth it — JR usage < ¥20,000" },
    { name: lang==="zh"?"JR 關西廣域 5日 Pass":"JR Kansai Wide 5-day", price: "12,000/人", verdict: lang==="zh"?"🟡 CP 值邊緣，可斟酌":"🟡 Marginal value" },
    { name: lang==="zh"?"大阪周遊卡 1日":"Osaka Amazing Pass 1-day", price: "3,300/人", verdict: lang==="zh"?"🟢 Day 6 或 Day 9 單日可考慮":"🟢 Consider for Day 6 or Day 9" },
    { name: lang==="zh"?"關西三都 Kansai Thru Pass 3日":"Kansai Thru Pass 3-day", price: "5,200/人", verdict: lang==="zh"?"🟡 若神戶+奈良+京都多次移動":"🟡 Good if visiting many Kansai cities" },
  ];
  return (
    <div className="fade">
      <div className="panel">
        <div className="transport-summary">
          <div className="transport-verdict">🎯 {lang==="zh"?"結論：不買 JR Pass，散票最划算":"Verdict: Skip JR Pass — buy point-to-point"}</div>
          <div className="transport-saving">{lang==="zh"?"兩人合計比買 7日 Pass 省約 ¥60,000":"Saves ~¥60,000 per couple vs. 7-day JR Pass"}</div>
        </div>
        <div className="card">
          <div className="card-header">📊 {t.routeComp}</div>
          <div className="card-body" style={{padding:"0 0 4px"}}>
            <table className="compare-table">
              <thead><tr>
                <th>{lang==="zh"?"路段":"Route"}</th>
                <th>{lang==="zh"?"推薦方式":"Recommended"}</th>
                <th>{lang==="zh"?"費用":"Cost"}</th>
              </tr></thead>
              <tbody>
                {routes.map((r,i) => (
                  <tr key={i}>
                    <td style={{fontWeight:600}}>{r.seg}</td>
                    <td>
                      {r.rec}
                      {r.best && <span className="rec-tag">推薦</span>}
                      <div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{r.note}</div>
                    </td>
                    <td style={{fontWeight:700,color:"#065f46"}}>¥{r.price}
                      {r.alt && r.alt!=="—" && <div style={{fontSize:10,color:"#94a3b8"}}>{r.alt}</div>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div className="card">
          <div className="card-header">🎫 {t.passEval}</div>
          <div className="card-body">
            {passes.map((p,i) => (
              <div key={i} style={{padding:"8px 0",borderBottom:i<passes.length-1?"1px solid #f1f5f9":"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:13,fontWeight:600}}>{p.name}</span>
                  <span style={{fontSize:12,color:"#64748b"}}>¥{p.price}</span>
                </div>
                <div style={{fontSize:12,color:"#475569"}}>{p.verdict}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-header">📱 {t.buyWhere}</div>
          <div className="card-body">
            {[
              {icon:"📱", zh:"SmartEX App — 東海道新幹線線上預約，綁信用卡+IC卡進站", en:"SmartEX App — Shinkansen booking, linked to credit card & IC"},
              {icon:"🛒", zh:"Klook / KKday — 名鐵μ-SKY、南海Rapi:t、USJ票券", en:"Klook / KKday — Meitetsu μ-SKY, Nankai Rapi:t, USJ tickets"},
              {icon:"🌐", zh:"近鐵官網 kintetsu.jp/yoyaku — あをによし特急（6/24 10:30開搶！）", en:"Kintetsu website kintetsu.jp/yoyaku — Aoniyoshi Ltd. Exp. (book 6/24 10:30!)"},
              {icon:"💳", zh:"ICOCA / Suica 綁 Apple Pay — 市內地鐵、便利商店全通用", en:"ICOCA / Suica via Apple Pay — metro, konbini, vending machines"},
            ].map((item,i) => (
              <div key={i} className="tip-item">
                <span className="tip-icon">{item.icon}</span>
                <span style={{fontSize:12}}>{lang==="zh"?item.zh:item.en}</span>
              </div>

    setChecks(prev => { const n=[...prev]; n[idx]=!n[idx]; return n; });
  };
  const total = checks.length;
  const done = checks.filter(Boolean).length;
  return (
    <div className="fade">
      <div className="panel">
        <div style={{background:"linear-gradient(135deg,#f0fdf4,#dcfce7)",border:"1.5px solid #86efac",borderRadius:12,padding:"12px 14px",marginBottom:12,textAlign:"center"}}>
          <div style={{fontSize:24,fontWeight:700,color:"#15803d"}}>{done} / {total}</div>
          <div style={{fontSize:12,color:"#16a34a"}}>{lang==="zh"?"項目已完成":"tasks completed"}</div>
          <div style={{background:"#e2e8f0",borderRadius:20,height:8,marginTop:8,overflow:"hidden"}}>
            <div style={{background:"#10b981",height:"100%",width:`${(done/total)*100}%`,borderRadius:20,transition:"width .3s"}}/>
          </div>
        </div>
        {initialSections.map((sec, si) => (
          <div key={si} className="card">
            <div className="card-header">{sec.title}</div>
            <div className="card-body">
              {sec.items.map((item, ii) => {
                const idx = globalIdx++;
                return (
                  <div key={ii} className="check-item" onClick={() => toggle(idx)}>
                    <div className={`check-box${checks[idx]?" done":""}`}>
                      {checks[idx] && <span style={{color:"#fff",fontSize:12}}>✓</span>}
                    </div>
                    <span className={`check-text${checks[idx]?" done":""}`}>
                      {item.text}
                      {item.urgent && <span className="check-urgent">{lang==="zh"?"時間戳！":"Time-critical!"}</span>}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
        <div className="card">
          <div className="card-header">📱 {lang==="zh"?"實用 App 清單":"Useful Apps"}</div>
          <div className="card-body">
            {[
              { icon:"🗺️", name:"Google Maps", desc:lang==="zh"?"路線規劃（本頁所有地圖按鈕）":"Navigation (all map buttons in this guide)" },
              { icon:"🚆", name:"NAVITIME / Yahoo!乗換案内", desc:lang==="zh"?"日本大眾運輸查詢":"Japanese transit planner" },
              { icon:"⛅", name:"tenki.jp / ウェザーニュース", desc:lang==="zh"?"即時天氣+雷雨警報":"Live weather + thunderstorm alerts" },
              { icon:"🚄", name:"SmartEX", desc:lang==="zh"?"東海道新幹線預約":"Tokaido Shinkansen booking" },
              { icon:"🎢", name:"USJ公式App", desc:lang==="zh"?"園內排隊時間、整理券":"USJ wait times & AR tickets" },
              { icon:"🌿", name:"HappyCow", desc:lang==="zh"?"全球素食餐廳搜尋":"Global vegan/veg restaurant finder" },
              { icon:"🆘", name:lang==="zh"?"台灣外交部急難救助":"Taiwan MOFA Emergency", desc:"+81-3-3280-7917（東京）" },
            ].map((a,i) => (
              <div key={i} className="tip-item">
                <span className="tip-icon">{a.icon}</span>
                <span><b>{a.name}</b> — {a.desc}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [lang, setLang] = useState("zh");
  const [activeTab, setActiveTab] = useState(0);
  const t = T[lang];
  const tabs = [
    ...DAYS.map((d,i) => ({ label: `Day ${d.day}`, icon: d.icon, color: d.color })),
    { label: t.transport, icon: "", color: "#0f766e" },
    { label: t.penguin, icon: "", color: "#7e22ce" },
    { label: t.food, icon: "", color: "#c2410c" },
    { label: t.checklist, icon: "", color: "#065f46" },
  ];
  const renderContent = () => {
    if (activeTab < 9) return <DayPanel data={DAYS[activeTab]} lang={lang}/>;
    if (activeTab === 9) return <TransportPanel lang={lang}/>;
    if (activeTab === 10) return <PenguinPanel lang={lang}/>;
    if (activeTab === 11) return <FoodPanel lang={lang}/>;
    if (activeTab === 12) return <ChecklistPanel lang={lang}/>;
  };
  const activeColor = tabs[activeTab]?.color || "#6366f1";
  return (
    <div style={{maxWidth:600,margin:"0 auto",minHeight:"100vh",background:"#f0f2f5"}}>
      <div className="header">
        <div className="header-title">{t.title}</div>
        <div className="header-sub">{t.subtitle}</div>
        <div className="header-badges">
          <span className="badge">✈️ 台灣虎航</span>
          <span className="badge">🌿 素食友善</span>
          <span className="badge">🐧 企鵝掃貨</span>
          <span className="badge">⛩️ 御朱印</span>
        </div>
        <button className="lang-btn" onClick={() => setLang(lang==="zh"?"en":"zh")}>{t.lang}</button>
      </div>
      <div className="tab-bar">
        {tabs.map((tab, i) => (
          <button
            key={i}
            className={`tab${activeTab===i?" active":""}`}
            style={{"--day-color": tab.color}}
            onClick={() => setActiveTab(i)}
          >
            {tab.icon && <span>{tab.icon}</span>}
            <span>{tab.label}</span>
          </button>
        ))}
      </div>
      <div key={`${activeTab}-${lang}`}>{renderContent()}</div>
      <div style={{textAlign:"center",padding:"20px 0",fontSize:11,color:"#94a3b8"}}>
        🌸 {lang==="zh"?"祝旅途愉快！滿載御朱印・企鵝・正能量平安返台":"Have a wonderful trip! Come home full of goshuin, penguins & good vibes 🐧⛩️🎆"}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
