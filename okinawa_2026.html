      { icon:"🛍️", name:"国際通り 朝の最後散策",         note:"多數店家10:00開門，建議9:30抵達先逛藥妝；11:30前出發去機場", noteEn:"Most shops open 10:00, leave for airport by 11:30", mapsUrl:"https://www.google.com/maps/search/国際通り+那覇" },
      { icon:"🧁", name:"カルビー+ 沖縄限定じゃがりこ", note:"期間限定口味手信，開門早，先搶購！", noteEn:"Okinawa-exclusive snacks, opens early—grab before they sell out", mapsUrl:"https://www.google.com/maps/search/カルビー+国際通り+沖縄" },
      { icon:"🍩", name:"Blue Seal アイスクリーム（空港）", note:"沖繩限定美式冰淇淋品牌，機場内也有店，最後一口甜點", noteEn:"Okinawa's iconic American-style ice cream, also in airport", mapsUrl:"https://www.google.com/maps/search/Blue+Seal+那覇空港" },
      { icon:"✈️", name:"那覇空港 出発ロビー",            note:"建議航班前2.5小時抵達。空港内還有很多手信採購機會", noteEn:"Arrive 2.5hrs before flight. Lots of last-minute gifts in airport", mapsUrl:"https://www.google.com/maps/search/那覇空港" },
    ],
    tips: [
      "🧳 建議早上先把大行李寄放飯店（或用行李寄送服務），輕裝逛街",
      "🎁 熱門手信清單：ちんすこう・紅芋タルト・シークヮーサー飲料・泡盛・限定じゃがりこ",
      "💴 記得花光剩餘零錢，或在機場換匯（レート較差，市區換匯更好）",
      "🔋 Suica退卡：那覇空港駅有退卡機，領回¥500押金（扣手續費¥220後約¥280）",

];

const TRANSPORT_DATA = {
  recommendation: {
    name: "Suica IC卡（市區）＋ 租車（中・北部 Day3/4）",
    reason: "那覇市區以ゆいレール為主，IC卡最彈性；中北部景點分散，租車是唯一有效率方案。2天租車約¥10,000-16,000，遠比計程車省",
    reasonEn: "IC card for Naha monorail; rental car (¥10,000-16,000 for 2 days) essential for central/north Okinawa",
    saving: "省¥20,000↑（vs 2天計程車遊覽）"
  },
  comparison: [
    { name:"Suica / ICOCA IC卡（那覇市區）", cost:"約¥1,040（2人合計）", note:"Day1+2+5 ゆいレール全程，無需另購Pass", recommended:true },
    { name:"ゆいレール 1日券（2人）",         cost:"¥1,600",             note:"需當天搭≥3次才值回票價，通常不划算", recommended:false },
    { name:"計程車（機場⇔市區）",             cost:"¥1,200-1,500/單程",  note:"快速方便，但多搭幾次就很貴", recommended:false },
    { name:"🚗 租車 Day3（中部）",             cost:"¥5,000-8,000 + 高速¥1,200", note:"強烈推薦！万座毛/アメリカンビレッジ公交幾乎不可達", recommended:true },
    { name:"🚗 租車 Day4（北部）",             cost:"¥5,000-8,000 + 高速¥2,000", note:"強烈推薦！美ら海水族館公交班次極少", recommended:true },
    { name:"OTS巴士觀光套裝（不自駕選項）",   cost:"¥4,000-7,000/人",   note:"適合不想開車者，但時間固定、彈性低", recommended:false },
  ],
  notes: [
    "🚗 沖繩中北部公共交通極不便，租車是必要手段，不是選配",
    "📅 6月底暑假前旺季，租車務必提前1-2個月預訂，否則容易缺車",
    "🏎️ 推薦租車公司：Times Car Rental / Orix Rent-a-Car / 日産Rent-a-Car（那覇空港周邊均有）",
    "🛣️ 沖繩靠左行駛（與台灣同），高速公路限速80km/h",
    "⛽ 沖繩油價較本土低，約¥160-175/L（ENEOS 連鎖最普遍）",
    "🅿️ 那覇市區停車費貴（¥200-300/30分），ゆいレール代步更省錢省事",
    "🎫 美ら海水族館門票建議在 Klook 預購，享折扣且免排隊領票",
  ]
};

const T = {
  zh: { title:"沖繩 5日自由行", subtitle:"📍 那覇・国際通り | 6/27（六）－ 7/1（三）", tabs:{ transport:"🚗 交通攻略", food:"🍜 美食", shop:"🛍️ 購物" } },
  en: { title:"Okinawa 5-Day Trip", subtitle:"📍 Naha / Kokusaidori | Jun 27(Sat) – Jul 1(Wed)", tabs:{ transport:"🚗 Transport", food:"🍜 Food", shop:"🛍️ Shop" } },
};

function MapPin() {
  return (
    <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z" fill="#fff"/>
    </svg>
  );
}

function WeatherCard({ weather, lang }) {
  if (!weather) return (
    <div style={{ background:"#f8fafc", border:"1px dashed #cbd5e1", borderRadius:12, padding:"12px 14px", marginBottom:12, fontSize:12, color:"#94a3b8", textAlign:"center" }}>
      {lang === "zh" ? "☁️ 天氣資料載入中..." : "☁️ Loading weather..."}
    </div>
  );
  const { icon, max, min, precip, wmoZh, wmoEn, clothingZh, clothingEn, isClimate } = weather;
  return (
    <div style={{ background:"linear-gradient(135deg,#eff6ff,#dbeafe)", border:"1.5px solid #bfdbfe", borderRadius:12, padding:"12px 14px", marginBottom:12 }}>
      <div style={{ fontWeight:700, fontSize:13, color:"#1d4ed8", marginBottom:8 }}>
        {icon} {lang === "zh" ? "今日天氣" : "Today's Weather"}
        <span style={{ fontSize:11, fontWeight:500, color:"#3b82f6", marginLeft:8 }}>{lang === "zh" ? wmoZh : wmoEn}</span>
        {isClimate && <span style={{ fontSize:10, color:"#94a3b8", marginLeft:6 }}>{lang === "zh" ? "（歷史氣候均值參考）" : "(climate avg)"}</span>}
      </div>
      <div style={{ display:"flex", gap:16, flexWrap:"wrap", fontSize:13, color:"#1e40af" }}>
        <span>🌡️ <b>{max}°C</b> / {min}°C</span>
        <span>🌂 {lang === "zh" ? `降雨 ${precip}mm` : `Rain ${precip}mm`}</span>
      </div>
      <div style={{ marginTop:8, fontSize:12, color:"#1e40af", fontWeight:500 }}>
        👕 {lang === "zh" ? `穿搭建議：${clothingZh}` : `Outfit: ${clothingEn}`}
      </div>
    </div>
  );
}

function RouteStep({ step, isLast, lang }) {
  const navUrl = "https://www.google.com/maps/dir/?api=1&origin=" +
    encodeURIComponent(step.from + " 沖縄") + "&destination=" +
    encodeURIComponent(step.to + " 沖縄") + "&travelmode=transit";
  return (
    <div style={{ display:"flex", gap:10 }}>
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:14 }}>
        <div style={{ width:14, height:14, borderRadius:"50%", backgroundColor:step.lineColor, border:"2.5px solid #fff", boxShadow:"0 0 0 1.5px "+step.lineColor+"40", flexShrink:0, marginTop:4 }} />
        {!isLast && <div style={{ flex:1, width:3, borderRadius:2, background:"linear-gradient(to bottom,"+step.lineColor+","+step.lineColor+"30)", marginTop:2, marginBottom:2, minHeight:20 }} />}
      </div>
      <div style={{ flex:1, paddingBottom: isLast ? 0 : 14 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
          <span style={{ fontWeight:700, fontSize:14, color:"#1a1a2e" }}>{step.from}</span>
          <span style={{ color:"#64748b", fontSize:12 }}>→</span>
          <span style={{ fontWeight:700, fontSize:14, color:"#1a1a2e" }}>{step.to}</span>
          <span style={{ fontSize:11, fontWeight:600, color:step.lineColor, background:step.lineColor+"15", padding:"1px 7px", borderRadius:10 }}>{step.time}</span>
        </div>
        <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>{step.line}</div>
        {step.note && <div style={{ fontSize:11, color:"#f59e0b", marginTop:2, fontWeight:500 }}>{step.note}</div>}
        <a href={navUrl} target="_blank" rel="noopener noreferrer"
          style={{ display:"inline-flex", alignItems:"center", gap:4, fontSize:11, fontWeight:600, color:"#fff", background:"#1a73e8", borderRadius:8, padding:"4px 10px", textDecoration:"none", marginTop:6 }}>
          <MapPin /> {lang === "zh" ? "導航" : "Navigate"}
        </a>
      </div>
    </div>
  );
}

function RouteCard({ route, lang }) {
  return (
    <div style={{ background:"#fff", borderRadius:12, padding:"14px 16px", marginBottom:12, boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10, flexWrap:"wrap", gap:6 }}>
        <span style={{ fontWeight:700, fontSize:13, color:"#1e293b" }}>{route.label}</span>
        <div style={{ display:"flex", gap:6 }}>
          {route.badge && <span style={{ fontSize:11, fontWeight:600, color:"#0ea5e9", background:"#e0f2fe", padding:"2px 8px", borderRadius:10 }}>{route.badge}</span>}
          {route.cost && <span style={{ fontSize:11, fontWeight:600, color:"#64748b", background:"#f1f5f9", padding:"2px 8px", borderRadius:10 }}>{route.cost}</span>}
        </div>
      </div>
      {route.steps.map((step, i) => <RouteStep key={i} step={step} isLast={i === route.steps.length - 1} lang={lang} />)}
    </div>
  );
}

function DayPanel({ data, lang, weatherData }) {
  if (!data) return null;
  return (
    <div style={{ animation:"fadeSlide .25s ease" }}>
      <div style={{ background:data.color+"12", border:"1.5px solid "+data.color+"30", borderRadius:12, padding:"12px 14px", marginBottom:14 }}>
        <div style={{ fontSize:13, fontWeight:700, color:data.color }}>{data.icon} {lang === "zh" ? data.summary : data.summaryEn || data.summary}</div>
      </div>
      <WeatherCard weather={weatherData} lang={lang} />
      {data.routes && data.routes.map((r, i) => <RouteCard key={i} route={r} lang={lang} />)}
      {data.spots && (
        <div style={{ background:"#fff", borderRadius:12, padding:"14px 16px", marginBottom:12, boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>
          <div style={{ fontWeight:700, fontSize:13, color:"#1e293b", marginBottom:10 }}>📍 {lang === "zh" ? "今日景點" : "Today's Spots"}</div>
          {data.spots.map((s, i) => (
            <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"8px 0", borderBottom: i < data.spots.length - 1 ? "1px solid #f1f5f9" : "none" }}>
              <span style={{ fontSize:16, flexShrink:0 }}>{s.icon || "📌"}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:600, fontSize:13, color:"#1e293b" }}>{s.name}</div>
                {s.note && <div style={{ fontSize:11, color:"#64748b", marginTop:2 }}>{lang === "zh" ? s.note : s.noteEn || s.note}</div>}
              </div>
              {s.mapsUrl && (
                <a className="gmaps-icon-btn" href={s.mapsUrl} target="_blank" rel="noopener noreferrer"><MapPin /></a>
              )}
            </div>
          ))}
        </div>
      )}
      {data.tips && data.tips.length > 0 && (
        <div style={{ background:"#fffbeb", border:"1.5px solid #fde68a", borderRadius:12, padding:"12px 14px" }}>
          <div style={{ fontWeight:700, fontSize:12, color:"#92400e", marginBottom:6 }}>💡 {lang === "zh" ? "小提示" : "Tips"}</div>
          {data.tips.map((tip, i) => <div key={i} style={{ fontSize:12, color:"#78350f", marginBottom:3 }}>{tip}</div>)}
        </div>
      )}
    </div>
  );
}

function TransportPanel({ data, lang }) {
  return (
    <div style={{ animation:"fadeSlide .25s ease" }}>
      {data.recommendation && (
        <div className="transport-card" style={{ borderRadius:12, padding:"14px 16px", marginBottom:12 }}>
          <div style={{ fontWeight:800, fontSize:14, color:"#7c3aed", marginBottom:8 }}>🎫 {lang === "zh" ? "推薦方案" : "Recommended"}</div>
          <div style={{ fontWeight:700, fontSize:15, color:"#1e293b" }}>{data.recommendation.name}</div>
          <div style={{ fontSize:12, color:"#64748b", marginTop:4 }}>{lang === "zh" ? data.recommendation.reason : data.recommendation.reasonEn || data.recommendation.reason}</div>
          {data.recommendation.saving && <span className="savings-badge" style={{ marginTop:8, display:"inline-flex" }}>💰 {data.recommendation.saving}</span>}
        </div>
      )}
      {data.comparison && (
        <div style={{ background:"#fff", borderRadius:12, padding:"14px 16px", marginBottom:12, boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>
          <div style={{ fontWeight:700, fontSize:13, color:"#1e293b", marginBottom:10 }}>💰 {lang === "zh" ? "費用比較" : "Cost Comparison"}</div>
          {data.comparison.map((item, i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom: i < data.comparison.length - 1 ? "1px solid #f1f5f9" : "none" }}>
              <div style={{ flex:1, marginRight:8 }}>
                <div style={{ fontWeight:600, fontSize:13 }}>{item.name}</div>
                {item.note && <div style={{ fontSize:11, color:"#64748b" }}>{item.note}</div>}
              </div>
              <div style={{ textAlign:"right", flexShrink:0 }}>
                <div style={{ fontWeight:700, fontSize:13, color: item.recommended ? "#7c3aed" : "#1e293b" }}>{item.cost}</div>
                {item.recommended && <span style={{ fontSize:10, color:"#7c3aed", fontWeight:600 }}>✓ {lang === "zh" ? "推薦" : "Best"}</span>}
              </div>
            </div>
          ))}
        </div>
      )}
      {data.notes && (
        <div style={{ background:"#fffbeb", border:"1.5px solid #fde68a", borderRadius:12, padding:"12px 14px" }}>
          <div style={{ fontWeight:700, fontSize:12, color:"#92400e", marginBottom:6 }}>⚠️ {lang === "zh" ? "注意事項" : "Notes"}</div>
          {data.notes.map((note, i) => <div key={i} style={{ fontSize:12, color:"#78350f", marginBottom:3 }}>{note}</div>)}
        </div>
      )}
    </div>
  );
}

function SpotListPanel({ spots, icon, lang }) {
  const areas = [...new Set(spots.map(s => s.a))];
  return (
    <div style={{ animation:"fadeSlide .25s ease" }}>
      {areas.map(area => (
        <div key={area} style={{ marginBottom:14 }}>
          <div style={{ fontWeight:700, fontSize:12, color:"#64748b", letterSpacing:1, marginBottom:8, padding:"0 2px" }}>{area}</div>
          <div style={{ background:"#fff", borderRadius:12, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>
            {spots.filter(s => s.a === area).map((spot, i, arr) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", borderBottom: i < arr.length - 1 ? "1px solid #f1f5f9" : "none" }}>
                <span style={{ fontSize:15, flexShrink:0 }}>{icon}</span>
                <span style={{ flex:1, fontSize:13, fontWeight:500, color:"#1e293b" }}>{spot.n}</span>
                <a className="gmaps-icon-btn" href={spot.u} target="_blank" rel="noopener noreferrer"><MapPin /></a>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [activeDay, setActiveDay] = useState(1);
  const [showPanel, setShowPanel] = useState(null);
  const [lang, setLang] = useState("zh");
  const [weather, setWeather] = useState({});

  useEffect(() => {
    setWeather(CLIMATE_AVG);
  }, []);

  const dayTabs = DAYS.map(d => ({
    key: d.day,
    label: "Day " + d.day,
    sub: d.date.slice(5).replace("-", "/"),
    icon: d.icon,
    color: d.color
  }));
  const extraTabs = [
    { key:"transport", label: lang === "zh" ? T.zh.tabs.transport : T.en.tabs.transport, icon:"🚗", color:"#0ea5e9" },
    { key:"food",      label: lang === "zh" ? T.zh.tabs.food      : T.en.tabs.food,      icon:"🍜", color:"#f59e0b" },
    { key:"shop",      label: lang === "zh" ? T.zh.tabs.shop      : T.en.tabs.shop,      icon:"🛍️", color:"#ec4899" },
  ];
  const allTabs = [...dayTabs, ...extraTabs];

  const currentDay = DAYS.find(d => d.day === activeDay);

  return (
    <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#f0f2f5" }}>
      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,#0c4a6e 0%,#0369a1 60%,#0ea5e9 100%)", padding:"24px 20px 16px", color:"#fff", position:"relative" }}>
        <button onClick={() => setLang(lang === "zh" ? "en" : "zh")}
          style={{ position:"absolute", top:16, right:16, fontSize:11, fontWeight:700, color:"#fff", background:"rgba(255,255,255,.2)", border:"1px solid rgba(255,255,255,.3)", borderRadius:8, padding:"4px 10px", cursor:"pointer", fontFamily:"inherit" }}>
          {lang === "zh" ? "EN" : "中文"}
        </button>
        <div style={{ fontSize:11, fontWeight:600, letterSpacing:2, opacity:.65, marginBottom:4 }}>🌺 OKINAWA TRAVEL GUIDE</div>
        <div style={{ fontSize:22, fontWeight:800, letterSpacing:-0.5 }}>{lang === "zh" ? T.zh.title : T.en.title}</div>
        <div style={{ fontSize:12.5, opacity:.75, marginTop:4 }}>{lang === "zh" ? T.zh.subtitle : T.en.subtitle}</div>
        <div style={{ display:"flex", gap:6, marginTop:12, flexWrap:"wrap" }}>
          {["🚝 ゆいレール", "🚗 自駕中北部", "🐋 美ら海水族館", "☔ 梅雨季末（6月底）"].map(tag => (
            <span key={tag} style={{ fontSize:10, fontWeight:600, background:"rgba(255,255,255,.18)", border:"1px solid rgba(255,255,255,.28)", borderRadius:10, padding:"2px 9px", color:"#fff" }}>{tag}</span>
          ))}
        </div>
      </div>

      {/* Tab Bar */}
      <div style={{ display:"flex", overflowX:"auto", background:"#fff", borderBottom:"1px solid #e2e8f0", position:"sticky", top:0, zIndex:10, boxShadow:"0 2px 8px rgba(0,0,0,.05)" }}>
        {allTabs.map(t => {
          const isExtra = ["transport","food","shop"].includes(t.key);
          const isActive = isExtra ? showPanel === t.key : (!showPanel && activeDay === t.key);
          return (
            <button key={t.key}
              onClick={() => {
                if (isExtra) setShowPanel(showPanel === t.key ? null : t.key);
                else { setShowPanel(null); setActiveDay(t.key); }
              }}
              style={{ flex:"1 0 auto", minWidth:50, padding:"10px 5px 8px", display:"flex", flexDirection:"column", alignItems:"center", gap:1, border:"none", cursor:"pointer", fontFamily:"inherit", background: isActive ? t.color+"10" : "transparent", borderBottom: isActive ? "2.5px solid "+t.color : "2.5px solid transparent", transition:"all .15s" }}>
              <span style={{ fontSize:15 }}>{t.icon}</span>
              <span style={{ fontSize:10, fontWeight: isActive ? 800 : 600, color: isActive ? t.color : "#64748b" }}>{t.label}</span>
              {t.sub && <span style={{ fontSize:9, color:"#94a3b8" }}>{t.sub}</span>}
            </button>
          );
        })}
      </div>

      {/* Content */}
      <div style={{ padding:"16px 16px 48px" }}>
        {showPanel === "transport" ? <TransportPanel data={TRANSPORT_DATA} lang={lang} />
          : showPanel === "food" ? <SpotListPanel spots={FOOD_SPOTS} icon="🍜" lang={lang} />
          : showPanel === "shop" ? <SpotListPanel spots={SHOP_SPOTS} icon="🛍️" lang={lang} />
          : <DayPanel data={currentDay} lang={lang} weatherData={weather[currentDay?.date]} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
